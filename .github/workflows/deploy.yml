name: Deploy to VPS (rsync over SSH)

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start SSH agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: Ensure rsync installed
        run: sudo apt-get update && sudo apt-get install -y rsync

      - name: Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy with rsync
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          REMOTE_PATH: ${{ secrets.REMOTE_PATH }}
        run: |
          rsync -avz --delete --exclude='.git' --exclude='.github' ./ $SSH_USER@$SSH_HOST:$REMOTE_PATH

      - name: Finished
        run: echo "Deploy finished"

# Required secrets:
# SSH_PRIVATE_KEY - private key for SSH (no passphrase recommended for CI; or use ssh-agent unlock flow)
# SSH_USER - remote user
# SSH_HOST - remote host or IP
# SSH_PORT - remote SSH port (22)
# REMOTE_PATH - destination directory on remote (e.g. /var/www/pearls-and-petals)
